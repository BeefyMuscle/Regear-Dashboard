<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guild Regear Dashboard v1.1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #f5f0e8;
  --bg2:       #ede7d9;
  --bg3:       #e4dccb;
  --border:    #c8bea8;
  --border2:   #b5a98e;
  --ink:       #2c2416;
  --ink2:      #4a3f2e;
  --ink3:      #7a6e58;
  --ink4:      #a09280;
  --accent:    #7a5c2e;
  --red:       #b03a2e;
  --red-bg:    #fdf0ee;
  --red-bd:    #e8c4bf;
  --green:     #2e6b45;
  --green-bg:  #eef5f0;
  --green-bd:  #b8d8c4;
  --amber:     #b06a1a;
  --amber-bg:  #fdf5e6;
  --amber-bd:  #e8d0a0;
  --purple:    #6b3fa0;
  --purple-bg: #f4f0fa;
  --purple-bd: #cebfea;
  --row-alt:   rgba(0,0,0,0.025);
  --nav:       #cfc4ae;
  --blue:      #1a6fa8;
  --blue-bg:   #e8f3fb;
  --blue-bd:   #a8d0ed;
}
body.dark {
  --bg:        #0e0c09;
  --bg2:       #161310;
  --bg3:       #1e1a15;
  --border:    #2e2820;
  --border2:   #3d3428;
  --ink:       #e8dcc8;
  --ink2:      #bfad94;
  --ink3:      #8a7a60;
  --ink4:      #544a38;
  --accent:    #c9943a;
  --red:       #c04a3a;
  --red-bg:    rgba(192,74,58,0.1);
  --red-bd:    rgba(192,74,58,0.3);
  --green:     #4a9e6a;
  --green-bg:  rgba(74,158,106,0.1);
  --green-bd:  rgba(74,158,106,0.3);
  --amber:     #c9943a;
  --amber-bg:  rgba(201,148,58,0.1);
  --amber-bd:  rgba(201,148,58,0.3);
  --purple:    #9b6edc;
  --purple-bg: rgba(155,110,220,0.1);
  --purple-bd: rgba(155,110,220,0.3);
  --row-alt:   rgba(255,255,255,0.02);
  --nav:       #0a0806;
  --blue:      #4a7ec0;
  --blue-bg:   rgba(74,126,192,0.1);
  --blue-bd:   rgba(74,126,192,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Source Sans 3', sans-serif;
  min-height: 100vh;
}

nav {
  background: var(--nav);
  border-bottom: 2px solid var(--border2);
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.nav-logo {
  font-family: 'Lora', serif;
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--accent);
  display: flex; align-items: center; gap: 10px;
}
.nav-logo .sep { color: var(--border2); }
.nav-logo .sub { font-family: 'Source Sans 3', sans-serif; font-weight: 300; font-size: 0.8rem; color: var(--ink3); }
.nav-right { display: flex; align-items: center; gap: 14px; }

.tabs {
  background: var(--nav);
  border-bottom: 1px solid var(--border);
  display: flex; padding: 0 28px;
}
.tab {
  padding: 11px 22px;
  font-size: 0.82rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink3); cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -1px; transition: all 0.15s; user-select: none;
}
.tab:hover { color: var(--ink2); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

main { max-width: 1300px; margin: 0 auto; padding: 28px 28px 0; }

.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 28px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 18px 12px;
  position: relative; padding-left: 22px;
}
.stat-card .bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 8px 0 0 8px;
}
.bar-brown  { background: var(--accent); }
.bar-red    { background: var(--red); }
.bar-purple { background: var(--purple); }
.bar-blue   { background: var(--blue); }
.sc-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink4); margin-bottom: 5px; }
.sc-val   { font-size: 1.4rem; font-weight: 700; color: var(--ink); line-height: 1; }
.c-red    { color: var(--red); }
.c-purple { color: var(--purple); }
.c-blue   { color: var(--blue); }
.sc-sub { font-size: 0.7rem; color: var(--ink4); margin-top: 3px; }

.filter-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.fbtn {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--ink3);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 20px; cursor: pointer;
  transition: all 0.15s;
}
.fbtn:hover { border-color: var(--border2); color: var(--ink2); }
.fbtn.active           { background: var(--accent); border-color: var(--accent); color: #fff; }

.cat-block { margin-bottom: 32px; }
.cat-heading {
  font-family: 'Lora', serif;
  font-size: 0.92rem; font-weight: 700;
  color: var(--accent); padding: 0 0 8px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 0;
  display: flex; align-items: center; gap: 10px;
}
.count-pill {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem; font-weight: 600;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 1px 8px; color: var(--ink4);
}

.inv-table { width: 100%; border-collapse: collapse; }
.inv-table thead tr { background: var(--bg3); }
.inv-table th:nth-child(1) { width: 210px; }
.inv-table th:nth-child(2) { width: 140px; }
.inv-table th:nth-child(3) { width: 140px; }
.inv-table th:nth-child(4) { width:  65px; }
.inv-table th:nth-child(5) { width:  80px; }
.inv-table th:nth-child(6) { width:  80px; }
.inv-table th:nth-child(7) { width:  80px; }
.inv-table th {
  text-align: left;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--ink4);
  padding: 7px 12px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.inv-table th.ctr { text-align: center; }
.inv-table td { padding: 0; border-bottom: 1px solid rgba(0,0,0,0.05); vertical-align: middle; }
.inv-table tbody tr:nth-child(even) td { background: var(--row-alt); }
.inv-table tbody tr:hover td { background: rgba(122,92,46,0.05); }

.inv-table tbody tr.row-need td { background: rgba(176,58,46,0.10); }
.inv-table tbody tr.row-need:hover td { background: rgba(176,58,46,0.16); }
.inv-table tbody tr td:first-child { border-left: 4px solid transparent; padding-left: 12px; }
.inv-table tbody tr.row-priority td:first-child { border-left: 4px solid var(--purple); }
.inv-table tbody tr.row-need     td:first-child { border-left: 4px solid var(--red); }
.inv-table tbody tr.row-ok       td:first-child { border-left: 4px solid var(--green); }

.td-name {
  padding: 9px 12px 9px 0px;
  font-size: 0.88rem; font-weight: 600; color: var(--ink2);
}
.td-ctr { text-align: center; padding: 7px 10px; }
.td-have { color: var(--ink2); }
.td-par  { color: var(--ink4); }
.need-pos  { color: var(--red);  font-weight: 700; font-size: 0.92rem; }
.need-zero { color: var(--ink4); font-size: 0.88rem; }

/* TICKER */
.ticker {
  display: inline-flex; align-items: center;
  border: 1px solid var(--border); border-radius: 5px;
  overflow: hidden; background: var(--bg);
}
.ticker button {
  background: var(--bg3); border: none;
  color: var(--ink3); font-size: 1rem; line-height: 1;
  width: 26px; height: 28px; cursor: pointer;
  transition: background 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.ticker button:hover   { background: var(--border);  color: var(--ink); }
.ticker button:active  { background: var(--border2); }
.tick-val {
  width: 40px; text-align: center;
  font-size: 0.88rem; font-weight: 700; color: var(--ink2);
  background: var(--bg); border: none; outline: none;
  padding: 0 2px; height: 28px;
  font-family: 'Source Sans 3', sans-serif;
  -moz-appearance: textfield;
}
.tick-val::-webkit-outer-spin-button,
.tick-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.tick-val:focus { background: var(--amber-bg); color: var(--amber); }

/* FLAG TOGGLES */
.flag-wrap { display: flex; justify-content: center; padding: 6px 8px; }
.flag-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 44px; height: 24px; padding: 0 6px;
  border-radius: 4px; border: 1px solid var(--border);
  background: var(--bg2); cursor: pointer;
  font-size: 0.64rem; font-weight: 700; letter-spacing: 0.04em;
  color: var(--ink4); transition: all 0.12s; user-select: none;
}
.flag-toggle:hover { border-color: var(--border2); color: var(--ink3); }
.flag-toggle.on-pri   { background: var(--purple-bg);  border-color: var(--purple-bd);  color: var(--purple); }
.flag-toggle.on-craft { background: var(--blue-bg);    border-color: var(--blue-bd);    color: var(--blue); }

/* BUY ORDERS */
.buy-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
.buy-col-head {
  font-family: 'Lora', serif; font-size: 0.95rem; font-weight: 700;
  color: var(--accent); padding-bottom: 8px;
  border-bottom: 2px solid var(--border); margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.buy-col-head span { font-family: 'Source Sans 3',sans-serif; font-size:0.7rem; font-weight:600; color:var(--ink4); }
.buy-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 12px; border-radius: 5px; margin-bottom: 4px;
  background: var(--bg2); border: 1px solid var(--border);
  font-size: 0.85rem;
}
.buy-row.is-pri { border-left: 3px solid var(--purple); }
.buy-row-name { font-weight: 600; color: var(--ink2); }
.buy-row-crafters { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.crafter-tag {
  font-size: 0.62rem; font-weight: 600; letter-spacing: 0.04em;
  padding: 2px 7px; border-radius: 10px;
  background: var(--blue-bg); border: 1px solid var(--blue-bd); color: var(--blue);
  cursor: pointer;
}
.crafter-tag-selected {
  background: var(--blue); border-color: var(--blue); color: var(--bg);
}
.crafter-tag-none { font-size: 0.62rem; color: var(--ink4); font-style: italic; }
.buy-row-inner { flex: 1; min-width: 0; }
.buy-row-need { font-weight: 700; color: var(--red); margin-left: 10px; }
.buy-row-assigned { font-size: 0.65rem; color: var(--blue); margin-left: 6px; }
.buyorders-toolbar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 16px; }
.count-pill-need { color: var(--red); }
.buy-empty { text-align:center; padding:24px; color:var(--ink4); font-style:italic; font-size:0.85rem; }

.section-label {
  font-size:0.68rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--ink4); margin:24px 0 10px;
  display:flex; align-items:center; gap:10px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* SUMMARY */
.summary-tiers {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}
.summary-tier-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.summary-tier-head {
  background: var(--bg3);
  border-bottom: 2px solid var(--border);
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.summary-tier-title {
  font-family: 'Lora', serif;
  font-size: 1rem; font-weight: 700;
  color: var(--accent);
}
.summary-tier-stats {
  display: flex; gap: 16px;
}
.summary-tier-stat { text-align: center; }
.summary-tier-stat .val { font-size: 1.1rem; font-weight: 700; line-height: 1; }
.summary-tier-stat .lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink4); margin-top: 2px; }
.summary-cat-list { padding: 8px 0; }
.summary-cat-row {
  display: flex; align-items: center;
  padding: 6px 18px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  gap: 10px;
}
.summary-cat-row:last-child { border-bottom: none; }
.summary-cat-name { font-size: 0.82rem; font-weight: 600; color: var(--ink2); flex: 1; }
.summary-progress-wrap { flex: 2; display: flex; align-items: center; gap: 8px; }
.summary-progress-track {
  flex: 1; height: 6px;
  background: var(--bg3); border-radius: 3px; overflow: hidden;
}
.summary-progress-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.4s ease;
}
.fill-ok      { background: var(--green); }
.fill-warn    { background: var(--amber); }
.fill-crit    { background: var(--red); }
.summary-progress-pct {
  font-size: 0.72rem; font-weight: 700;
  min-width: 34px; text-align: right;
}
.pct-ok   { color: var(--green); }
.pct-warn { color: var(--amber); }
.pct-crit { color: var(--red); }
.summary-need-count {
  font-size: 0.72rem; font-weight: 700;
  color: var(--red); min-width: 28px; text-align: right;
}
.summary-need-none { color: var(--ink4); }

.summary-critical {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; margin-bottom: 28px;
}
.summary-critical-head {
  background: var(--bg3); border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  font-family: 'Lora', serif; font-size: 0.88rem; font-weight: 700;
  color: var(--red); display: flex; align-items: center; justify-content: space-between;
}
.summary-critical-head span { font-family: 'Source Sans 3', sans-serif; font-size: 0.68rem; font-weight: 600; color: var(--ink4); }
.summary-critical-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
}
.summary-crit-item {
  padding: 8px 16px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  border-right: 1px solid rgba(0,0,0,0.04);
  display: flex; align-items: center; justify-content: space-between;
}
.summary-crit-item:hover { background: var(--row-alt); }
.summary-crit-name { font-size: 0.82rem; font-weight: 600; color: var(--ink2); }
.summary-crit-meta { font-size: 0.65rem; color: var(--ink4); margin-top: 1px; }
.summary-crit-need { font-size: 0.85rem; font-weight: 700; color: var(--red); }
.crafters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.crafter-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.crafter-card-head {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  font-family: 'Lora', serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.crafter-card-head .crafter-count {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--ink4);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1px 8px;
}
.crafter-list { padding: 8px 0; min-height: 40px; }
.crafter-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px;
  font-size: 0.86rem;
  color: var(--ink2);
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.crafter-row:last-child { border-bottom: none; }
.crafter-row:hover { background: var(--row-alt); }
.crafter-name { font-weight: 600; }
.crafter-remove {
  background: none; border: none;
  color: var(--ink4); cursor: pointer;
  font-size: 0.75rem; padding: 2px 6px;
  border-radius: 3px; transition: all 0.12s;
  font-family: 'Source Sans 3', sans-serif;
}
.crafter-remove:hover { color: var(--red); background: var(--red-bg); }
.crafter-empty { padding: 10px 14px; font-size: 0.8rem; color: var(--ink4); font-style: italic; }
.add-crafter-row {
  display: flex;
  gap: 6px;
  padding: 8px 14px 10px;
  border-top: 1px solid var(--border);
}
.add-crafter-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 5px 10px;
  font-size: 0.82rem;
  color: var(--ink);
  font-family: 'Source Sans 3', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.add-crafter-input:focus { border-color: var(--accent); }
.add-crafter-input::placeholder { color: var(--ink4); }
.add-crafter-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.add-crafter-btn:hover { opacity: 0.85; }

.save-timestamp {
  font-size: 0.7rem; color: var(--ink4); font-family: 'Source Sans 3', sans-serif;
  letter-spacing: 0.04em; white-space: nowrap;
}
.save-timestamp span { color: var(--ink3); font-weight: 600; }

.summary-hero {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}
.summary-hero-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px 22px;
  position: relative; padding-left: 26px;
  display: flex; flex-direction: column; gap: 4px;
}
.summary-hero-card .bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 8px 0 0 8px;
}
.summary-hero-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink4);
}
.summary-hero-val {
  font-size: 2rem; font-weight: 700; line-height: 1; color: var(--ink);
}
.summary-hero-sub {
  font-size: 0.72rem; color: var(--ink4); margin-top: 2px;
}

.tab-content { display:none; }
.tab-content.active { display:block; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink2); color: var(--bg); font-family: 'Source Sans 3', sans-serif;
  font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em;
  padding: 8px 20px; border-radius: 20px;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 9999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.toast-error { background: var(--red); }

::-webkit-scrollbar { width:7px; height:7px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

.nav-btn, .edit-mode-btn {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--ink3); font-family: 'Source Sans 3', sans-serif;
  font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em;
  padding: 5px 14px; border-radius: 20px; cursor: pointer;
  transition: all 0.15s;
}
.nav-btn:hover, .edit-mode-btn:hover { border-color: var(--accent); color: var(--accent); }
.edit-mode-btn.active { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber); }

.theme-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border2);
  font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
  color: var(--ink3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Source Sans 3', sans-serif;
  transition: all 0.15s;
  flex-shrink: 0;
}
.theme-btn:hover { border-color: var(--accent); transform: scale(1.1); }

.flag-toggle.on-hide { background: var(--bg3); border-color: var(--border2); color: var(--ink4); text-decoration: line-through; }

.guide-section {

}
.guide-badge {

// ── STATE ─────────────────────────────────────────────────────────────────
let data     = JSON.parse(JSON.stringify(INIT));
let filters  = { T7:'all', T8:'all', T9:'all' };
let editMode = false;
const TIERS  = ['T7','T8','T9'];
const need   = i => Math.max(0, i.par - i.have);

// Debounced save — batches rapid ticker clicks into one write
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToStorage, 400);
}

// Single full re-render used after import/load
function renderAll() {
  TIERS.forEach(t => renderTier(t));
  renderBuyOrders();
  renderSummary();
  renderCrafters();
}

// Partial re-render for data mutations (crafters unchanged)
function renderData() {
  TIERS.forEach(t => renderTier(t));
  renderBuyOrders();
  renderSummary();
}

// ── THEME ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const dark = document.body.classList.toggle('dark');
  document.getElementById('themeBtn').textContent = dark ? 'L' : 'D';
  localStorage.setItem('regear-theme', dark ? 'dark' : 'light');
}

// ── EDIT MODE ─────────────────────────────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('editModeBtn');
  btn.classList.toggle('active', editMode);
  btn.textContent = editMode ? '✎ Done Editing' : '✎ Edit Items';
  TIERS.forEach(t => renderTier(t));
}

// ── TABS ──────────────────────────────────────────────────────────────────
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

// ── FILTERS ───────────────────────────────────────────────────────────────
function setFilter(tier, f) {
  filters[tier] = f;
  const t = tier.toLowerCase();
  ['all','Helmet','Jacket','Shoes','Offhands','Warrior','Hunter','Mage'].forEach(x => {
    document.getElementById(`${t}-f-${x}`)?.classList.toggle('active', x === f);
  });
  renderTier(tier);
}

// ── RENDER TIER ───────────────────────────────────────────────────────────
function renderTier(tier) {
  const f = filters[tier];
  const container = document.getElementById('inv-' + tier.toLowerCase());
  container.innerHTML = '';

  // Single pass: count stats while building rows
  let total=0, needed=0, pri=0, craft=0;

  for (const [cat, items] of Object.entries(data[tier])) {
    // Count stats for all items (regardless of filter)
    for (const i of items) {
      if (i.hidden) continue;
      total++;
      if (need(i) > 0) needed++;
      if (i.priority)  pri++;
      if (i.craft)     craft++;
    }

    if (f !== 'all' && f !== cat) continue;
    if (!items.length) continue;

    let visCount = 0, needCount = 0;
    for (const i of items) {
      if (!editMode && i.hidden) continue;
      visCount++;
      if (need(i) > 0) needCount++;
    }
    if (!visCount) continue;
    const catKey = cat.replace(/\s+/g, '_');

    const block = document.createElement('div');
    block.className = 'cat-block';
    block.innerHTML = `
      <div class="cat-heading">
        ${cat}
        <span class="count-pill">${visCount} items${needCount ? ` &nbsp;·&nbsp; <span class="count-pill-need">${needCount} needed</span>` : ''}</span>
      </div>
      <table class="inv-table">
        <thead><tr>
          <th>Item</th>
          <th class="ctr">Have</th>
          <th class="ctr">Par</th>
          <th class="ctr">Need</th>
          <th class="ctr">Priority</th>
          <th class="ctr">Craft</th>
          ${editMode ? '<th class="ctr">Hide</th>' : ''}
        </tr></thead>
        <tbody id="tb-${tier}-${catKey}"></tbody>
      </table>`;
    container.appendChild(block);

    const tbody = document.getElementById(`tb-${tier}-${catKey}`);
    const frag  = document.createDocumentFragment();

    for (const [actualIdx, item] of items.entries()) {
      if (!editMode && item.hidden) continue;
      const n  = need(item);
      const rc = item.hidden
        ? 'row-hidden'
        : n > 0
          ? (item.priority ? 'row-priority row-need' : 'row-need')
          : item.priority ? 'row-priority' : 'row-ok';

      const tr = document.createElement('tr');
      tr.className = rc;
      tr.innerHTML = `
        <td class="td-name">${item.name}</td>
        <td class="td-ctr td-have"><div class="ticker">
          <button onclick="adj('${tier}','${cat}',${actualIdx},'have',-1)">−</button>
          <input class="tick-val" type="number" value="${item.have}" min="0" onchange="setV('${tier}','${cat}',${actualIdx},'have',this.value)"/>
          <button onclick="adj('${tier}','${cat}',${actualIdx},'have',1)">+</button>
        </div></td>
        <td class="td-ctr td-par"><div class="ticker">
          <button onclick="adj('${tier}','${cat}',${actualIdx},'par',-1)">−</button>
          <input class="tick-val" type="number" value="${item.par}" min="0" onchange="setV('${tier}','${cat}',${actualIdx},'par',this.value)"/>
          <button onclick="adj('${tier}','${cat}',${actualIdx},'par',1)">+</button>
        </div></td>
        <td class="td-ctr"><span class="${n>0?'need-pos':'need-zero'}">${n>0?n:'—'}</span></td>
        <td><div class="flag-wrap"><span class="flag-toggle ${item.priority?'on-pri':''}" onclick="toggleF('${tier}','${cat}',${actualIdx},'priority')">${item.priority?'★ PRI':'PRI'}</span></div></td>
        <td><div class="flag-wrap"><span class="flag-toggle ${item.craft?'on-craft':''}" onclick="toggleF('${tier}','${cat}',${actualIdx},'craft')">${item.craft?'✦ CRF':'CRF'}</span></div></td>
        ${editMode ? `<td><div class="flag-wrap"><span class="flag-toggle ${item.hidden?'on-hide':''}" onclick="toggleF('${tier}','${cat}',${actualIdx},'hidden')">${item.hidden?'✕ Hide':'Hide'}</span></div></td>` : ''}`;
      frag.appendChild(tr);
    }
    tbody.appendChild(frag);
  }

  // Render stats cards after iterating all items
  document.getElementById('stats-' + tier.toLowerCase()).innerHTML =
    statCard('bar-brown', '',        'Items Tracked',   total,  tier + ' tier') +
    statCard('bar-red',   'c-red',   'Need to Restock', needed, 'below par') +
    statCard('bar-purple','c-purple','Priority',         pri,    'flagged urgent') +
    statCard('bar-blue',  'c-blue',  'Craft Queue',      craft,  'to craft');
}

function statCard(bar, valCls, label, val, sub) {
  return `<div class="stat-card"><div class="bar ${bar}"></div><div class="sc-label">${label}</div><div class="sc-val ${valCls}">${val}</div><div class="sc-sub">${sub}</div></div>`;
}

// ── MUTATIONS ─────────────────────────────────────────────────────────────
function adj(tier, cat, idx, field, d) {
  data[tier][cat][idx][field] = Math.max(0, data[tier][cat][idx][field] + d);
  renderData(); scheduleSave();
}
function setV(tier, cat, idx, field, v) {
  data[tier][cat][idx][field] = Math.max(0, parseInt(v) || 0);
  renderData(); scheduleSave();
}
function toggleF(tier, cat, idx, flag) {
  data[tier][cat][idx][flag] = !data[tier][cat][idx][flag];
  renderData(); scheduleSave();
}

// ── BUY ORDERS ────────────────────────────────────────────────────────────
let crafterAssignments = {}; // key: `${tier}-${cat}-${itemName}` => crafterName

function toggleCrafterAssignment(tier, cat, itemName, crafterName) {
  const key = `${tier}-${cat}-${itemName}`;
  crafterAssignments[key] = crafterAssignments[key] === crafterName ? null : crafterName;
  renderBuyOrders();
}

function renderBuyOrders() {
  const cols = Object.fromEntries(TIERS.map(t => [t, []]));
  for (const tier of TIERS) {
    for (const [cat, items] of Object.entries(data[tier])) {
      for (const i of items) {
        if (!i.hidden && i.craft && need(i) > 0)
          cols[tier].push({ ...i, cat, tier, n: need(i) });
      }
    }
    cols[tier].sort((a, b) => (b.priority - a.priority) || (b.n - a.n));
  }

  const c = document.getElementById('buyOrders');
  c.innerHTML = '';
  for (const key of TIERS) {
    const div = document.createElement('div');
    div.innerHTML = `<div class="buy-col-head">${key}<span>${cols[key].length} needed</span></div>`;
    if (!cols[key].length) {
      div.innerHTML += `<div class="buy-empty">✓ All stocked</div>`;
    } else {
      for (const i of cols[key]) {
        const crafterList = getCraftersForItem(i.cat);
        const assignKey   = `${i.tier}-${i.cat}-${i.name}`;
        const assigned    = crafterAssignments[assignKey];

        const crafterHTML = crafterList.length
          ? crafterList.map(n => {
              const isAssigned = assigned === n;
              return `<span
                class="crafter-tag ${isAssigned ? 'crafter-tag-selected' : ''}"
                onclick="toggleCrafterAssignment('${i.tier}','${i.cat}','${i.name.replace(/'/g,"\\'")}','${n}')"
                title="${isAssigned ? 'Click to unassign' : `Assign to ${n}`}"
              >${n}</span>`;
            }).join('')
          : `<span class="crafter-tag-none">No crafters</span>`;

        const assignedLabel = assigned
          ? `<span class="buy-row-assigned">→ ${assigned}</span>`
          : '';

        div.innerHTML += `<div class="buy-row ${i.priority?'is-pri':''}">
          <div class="buy-row-inner">
            <div class="buy-row-name">${i.priority?'★ ':''}${i.name}${assignedLabel}</div>
            <div class="buy-row-crafters">${crafterHTML}</div>
          </div>
          <div class="buy-row-need">−${i.n}</div>
        </div>`;
      }
    }
    c.appendChild(div);
  }
}

// Pre-group crafter categories to avoid repeated .filter() calls in renderCrafters
const CRAFTER_GROUPS = CRAFTER_CATS.reduce((acc, cat) => {
  (acc[cat.group] ??= []).push(cat);
  return acc;
}, {});

function getCraftersForItem(cat) {
  const ids = CAT_TO_CRAFTERS[cat] || [];
  return [...new Set(ids.flatMap(id => crafters[id] || []))];
}

function renderCrafters() {
  const container = document.getElementById('crafters-content');
  container.innerHTML = '';
  for (const [group, cats] of Object.entries(CRAFTER_GROUPS)) {
    container.innerHTML += `<div class="section-label">${group}</div>`;
    const grid = document.createElement('div');
    grid.className = 'crafters-grid';
    for (const cat of cats) {
      const members = crafters[cat.id];
      const listHTML = members.length
        ? members.map((name, i) => `
            <div class="crafter-row">
              <span class="crafter-name">${name}</span>
              <button class="crafter-remove" onclick="removeCrafter('${cat.id}',${i})">Remove</button>
            </div>`).join('')
        : `<div class="crafter-empty">No crafters added yet</div>`;
      const card = document.createElement('div');
      card.className = 'crafter-card';
      card.innerHTML = `
        <div class="crafter-card-head">
          ${cat.label}
          <span class="crafter-count">${members.length} crafter${members.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="crafter-list">${listHTML}</div>
        <div class="add-crafter-row">
          <input class="add-crafter-input" id="input-${cat.id}" type="text" placeholder="Player name..." onkeydown="if(event.key==='Enter')addCrafter('${cat.id}')"/>
          <button class="add-crafter-btn" onclick="addCrafter('${cat.id}')">Add</button>
        </div>`;
      grid.appendChild(card);
    }
    container.appendChild(grid);
  }
}

function addCrafter(catId) {
  const input = document.getElementById('input-' + catId);
  const name  = input.value.trim();
  if (!name) return;
  crafters[catId].push(name);
  input.value = '';
  renderCrafters();
  renderBuyOrders();
  saveToStorage();
}

function removeCrafter(catId, idx) {
  crafters[catId].splice(idx, 1);
  renderCrafters();
  renderBuyOrders();
  saveToStorage();
}

// ── SUMMARY ───────────────────────────────────────────────────────────────
function renderSummary() {
  const container = document.getElementById('summary-content');
  container.innerHTML = '';

  // ── Single pass: compute global stats + per-tier stats simultaneously ──
  let grandTotal = 0, grandNeeded = 0, grandCraft = 0;
  const tierStats = {};
  for (const tier of TIERS) {
    let tierTotal = 0, tierNeeded = 0;
    const catStats = {};
    for (const [cat, items] of Object.entries(data[tier])) {
      let visCount = 0, catNeeded = 0;
      for (const i of items) {
        if (i.hidden) continue;
        visCount++; tierTotal++; grandTotal++;
        if (need(i) > 0) { catNeeded++; tierNeeded++; grandNeeded++; }
        if (i.craft) grandCraft++;
      }
      catStats[cat] = { visCount, catNeeded };
    }
    tierStats[tier] = { tierTotal, tierNeeded, catStats };
  }
  const healthPct   = grandTotal ? Math.round(((grandTotal - grandNeeded) / grandTotal) * 100) : 100;
  const healthColor = healthPct >= 80 ? 'green' : healthPct >= 50 ? 'amber' : 'red';
  const healthLabel = healthPct >= 80 ? 'Well stocked' : healthPct >= 50 ? 'Needs attention' : 'Critical';

  // ── Hero cards ──
  const hero = document.createElement('div');
  hero.className = 'summary-hero';
  hero.innerHTML = `
    <div class="summary-hero-card">
      <div class="bar" style="background:var(--${healthColor})"></div>
      <div class="summary-hero-label">Guild Readiness</div>
      <div class="summary-hero-val" style="color:var(--${healthColor})">${healthPct}%</div>
      <div class="summary-hero-sub">${healthLabel} · ${grandTotal - grandNeeded} of ${grandTotal} stocked</div>
    </div>
    <div class="summary-hero-card">
      <div class="bar bar-red"></div>
      <div class="summary-hero-label">Total Shortages</div>
      <div class="summary-hero-val c-red">${grandNeeded}</div>
      <div class="summary-hero-sub">items below par across all tiers</div>
    </div>
    <div class="summary-hero-card">
      <div class="bar bar-blue"></div>
      <div class="summary-hero-label">Craft Queue</div>
      <div class="summary-hero-val c-blue">${grandCraft}</div>
      <div class="summary-hero-sub">items marked for crafting</div>
    </div>`;
  container.appendChild(hero);

  // Critical items: priority + need > 0
  const critical = [];
  for (const tier of TIERS) {
    for (const [cat, items] of Object.entries(data[tier])) {
      for (const i of items) {
        if (!i.hidden && i.priority && need(i) > 0)
          critical.push({ name: i.name, tier, cat, n: need(i) });
      }
    }
  }
  critical.sort((a, b) => b.n - a.n);

  if (critical.length) {
    const critBlock = document.createElement('div');
    critBlock.className = 'summary-critical';
    critBlock.innerHTML = `
      <div class="summary-critical-head">
        Priority Shortages
        <span>${critical.length} item${critical.length !== 1 ? 's' : ''} flagged</span>
      </div>
      <div class="summary-critical-grid">
        ${critical.map(i => `
          <div class="summary-crit-item">
            <div>
              <div class="summary-crit-name">${i.name}</div>
              <div class="summary-crit-meta">${i.tier} · ${i.cat}</div>
            </div>
            <div class="summary-crit-need">−${i.n}</div>
          </div>`).join('')}
      </div>`;
    container.appendChild(critBlock);
  }

  const tierGrid = document.createElement('div');
  tierGrid.className = 'summary-tiers';

  for (const tier of TIERS) {
    const { tierTotal, tierNeeded, catStats } = tierStats[tier];
    const catRows = Object.entries(catStats).map(([cat, { visCount, catNeeded }]) => {
      const have = visCount - catNeeded;
      const pct       = visCount ? Math.round((have / visCount) * 100) : 100;
      const fillClass = pct >= 80 ? 'fill-ok' : pct >= 50 ? 'fill-warn' : 'fill-crit';
      const pctClass  = pct >= 80 ? 'pct-ok'  : pct >= 50 ? 'pct-warn'  : 'pct-crit';
      return `
        <div class="summary-cat-row">
          <div class="summary-cat-name">${cat}</div>
          <div class="summary-progress-wrap">
            <div class="summary-progress-track">
              <div class="summary-progress-fill ${fillClass}" style="width:${pct}%"></div>
            </div>
            <span class="summary-progress-pct ${pctClass}">${pct}%</span>
          </div>
          <div class="summary-need-count ${catNeeded ? '' : 'summary-need-none'}">${catNeeded ? `−${catNeeded}` : '✓'}</div>
        </div>`;
    }).join('');

    const overallPct   = tierTotal ? Math.round(((tierTotal - tierNeeded) / tierTotal) * 100) : 100;
    const overallColor = overallPct >= 80 ? 'green' : overallPct >= 50 ? 'amber' : 'red';
    const card = document.createElement('div');
    card.className = 'summary-tier-card';
    card.innerHTML = `
      <div class="summary-tier-head">
        <div class="summary-tier-title">${tier}</div>
        <div class="summary-tier-stats">
          <div class="summary-tier-stat"><div class="val" style="color:var(--${overallColor})">${overallPct}%</div><div class="lbl">Stocked</div></div>

        </div>
      </div>
      <div class="summary-cat-list">${catRows}</div>`;
    tierGrid.appendChild(card);
  }
  container.appendChild(tierGrid);

  // ── How to use guide ──
  const guide = document.createElement('div');
  guide.className = 'guide-card';
  guide.innerHTML = `
    <div class="guide-head">How to Use This Dashboard</div>
    <div class="guide-body">
      <div class="guide-section">
        <div class="guide-section-title">Getting Started</div>
        <div class="guide-rows">
          <div class="guide-row">Browse <strong>Tier 7, 8, or 9</strong> tabs to see all tracked gear and weapons.</div>
          <div class="guide-row">Use the <strong>Have</strong> ticker to record how many of each item you currently have in stock.</div>
          <div class="guide-row">Set a <strong>Par</strong> value for each item — this is your target quantity. The <strong>Need</strong> column calculates automatically.</div>
          <div class="guide-row">Use the <strong>category filter bar</strong> to quickly jump to Helmets, Warrior weapons, Mage staves, etc.</div>
        </div>
      </div>
      <div class="guide-section">
        <div class="guide-section-title">Flags</div>
        <div class="guide-rows">
          <div class="guide-row"><span class="guide-badge gb-purple">★ PRI</span> Mark an item as <strong>Priority</strong> — it shows a purple left border and appears in the Priority Shortages list on this page.</div>
          <div class="guide-row"><span class="guide-badge gb-blue">✦ CRF</span> Mark an item for <strong>Crafting</strong> — it will appear on the Buy Orders tab so crafters know what to make.</div>
          <div class="guide-row"><span class="guide-badge gb-red">Need</span> Rows tinted red have a <strong>Need &gt; 0</strong> — you are below par on that item.</div>
          <div class="guide-row"><span class="guide-badge gb-green">OK</span> Green left border means the item is <strong>fully stocked</strong> at or above par.</div>

function getRecipe(itemName) {
  return BAKED_RECIPES[itemName] || null;
}

const ROYAL_ITEMS = new Set([
  'Royal Helmet','Royal Armor','Royal Boots',
  'Royal Hood','Royal Jacket','Royal Shoes',
  'Royal Cowl','Royal Robe','Royal Sandals',
]);

function exportBuyOrders() {
  const allItems = [];
  for (const tier of TIERS) {
    for (const [cat, catItems] of Object.entries(data[tier])) {
      for (const i of catItems) {
        if (!i.hidden && i.craft && need(i) > 0) {
          const assignKey = `${tier}-${cat}-${i.name}`;
          allItems.push({ ...i, tier, cat, n: need(i), assigned: crafterAssignments[assignKey] || null });
        }
      }
    }
  }
  allItems.sort((a, b) => (b.priority - a.priority) || (b.n - a.n));

  if (!allItems.length) { showToast('No buy orders to export', true); return; }

  const enriched = allItems.map(i => ({
    ...i,
    mats: getRecipe(i.name),
  }));

  const lines = [`Buy Orders — ${new Date().toLocaleDateString()}    ★ = NEED IT NOW`, ''];

  const byCrafter  = {};
  const unassigned = [];
  for (const i of enriched) {
    if (i.assigned) (byCrafter[i.assigned] ??= []).push(i);
    else unassigned.push(i);
  }

  function itemLines(i) {
    const pri = i.priority ? '★ ' : '  ';
    const out = [`${pri}${i.name.padEnd(30)} Need: ${String(i.n).padStart(3)}  [${i.tier}]`];
    if (i.mats?.length) {
      const matsStr = i.mats.map(([mat, count]) => `${mat} x${count * i.n}`).join(', ');
      out.push(`      Materials: ${matsStr}`);
    }
    out.push('');
    return out;
  }

  for (const [crafter, items] of Object.entries(byCrafter)) {
    lines.push(`── ${crafter} ${'─'.repeat(Math.max(0, 28 - crafter.length))}`);
    lines.push('');
    for (const i of items) lines.push(...itemLines(i));
  }

  if (unassigned.length) {
    lines.push(`── Unassigned ───────────────────`);
    lines.push('');
    for (const i of unassigned) {
      const pri = i.priority ? '★ ' : '  ';
      lines.push(`${pri}${i.name.padEnd(30)} Need: ${String(i.n).padStart(3)}  [${i.tier}]`);
      if (i.mats?.length) {
        const matsStr = i.mats.map(([mat, count]) => `${mat} x${count * i.n}`).join(', ');
        lines.push(`      Materials: ${matsStr}`);
      }
      lines.push('');
    }
  }

  // Total materials summary — broken down by tier
  const BASIC_MATS = new Set(['Steel Bar', 'Wooden Plank', 'Cloth', 'Worked Leather']);

  const totals = Object.fromEntries(TIERS.map(t => [t, {}]));
  const royalSigils = Object.fromEntries(TIERS.map(t => [t, 0]));
  for (const i of enriched) {
    if (ROYAL_ITEMS.has(i.name)) royalSigils[i.tier] += i.n;
    if (!i.mats?.length) continue;
    for (const [mat, count] of i.mats) {
      totals[i.tier][mat] = (totals[i.tier][mat] || 0) + (count * i.n);
    }
  }

  const anyTotals = TIERS.some(t => Object.keys(totals[t]).length || royalSigils[t]);
  if (anyTotals) {
    lines.push(`═══════════════════════════════════`);
    lines.push(`TOTAL MATERIALS REQUIRED`);
    lines.push(`═══════════════════════════════════`);
    for (const tier of TIERS) {
      const tierMats = totals[tier];
      const sigils   = royalSigils[tier];
      if (!Object.keys(tierMats).length && !sigils) continue;
      lines.push('');
      lines.push(`  ── ${tier} ${'─'.repeat(28)}`);
      for (const [label, count] of Object.entries(tierMats).sort(([a],[b]) => a.localeCompare(b))) {
        lines.push(`    ${label.padEnd(30)} x${count}`);
      }
      if (sigils) {
        lines.push(`    ${'Miscellaneous Sigils'.padEnd(30)} x${sigils}`);
      }
    }

    lines.push('');
    lines.push(`═══════════════════════════════════`);
    lines.push(`EXPECTED RETURN (15%)`);
    lines.push(`═══════════════════════════════════`);
    for (const tier of TIERS) {
      const tierMats = totals[tier];
      const returnMats = Object.entries(tierMats).filter(([mat]) => BASIC_MATS.has(mat));
      if (!returnMats.length) continue;
      lines.push('');
      lines.push(`  ── ${tier} ${'─'.repeat(28)}`);
      for (const [label, count] of returnMats.sort(([a],[b]) => a.localeCompare(b))) {
        lines.push(`    ${label.padEnd(30)} +${Math.floor(count * 0.15)}`);
      }
    }
    lines.push('');
  }

  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `buy-orders-${new Date().toISOString().slice(0, 10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Buy Orders exported!');
}

function exportData() {
  const blob = new Blob([JSON.stringify({ data, crafters }, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `regear-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      mergeData(JSON.parse(e.target.result));
      saveToStorage();
      renderAll();
      showToast('Imported!');
    } catch { showToast('Invalid file', true); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── LOCALSTORAGE ──────────────────────────────────────────────────────────
const STORAGE_KEY = 'regear-dashboard-v1';

function mergeData(saved) {
  if (saved.data) {
    for (const tier of TIERS) {
      if (!saved.data[tier]) continue;
      for (const [cat, savedItems] of Object.entries(saved.data[tier])) {
        if (!data[tier]?.[cat]) continue;
        // Build a Map for O(1) lookups instead of O(n) find() per item
        const savedMap = new Map(savedItems.map(s => [s.name, s]));
        for (const item of data[tier][cat]) {
          const match = savedMap.get(item.name);
          if (match) {
            item.have     = match.have     ?? 0;
            item.par      = match.par      ?? 0;
            item.priority = match.priority ?? false;
            item.craft    = match.craft    ?? false;
            item.hidden   = match.hidden   ?? false;
          }
        }
      }
    }
  }
  if (saved.crafterAssignments) {
    Object.assign(crafterAssignments, saved.crafterAssignments);
  }
  if (saved.crafters) {
    for (const [id, names] of Object.entries(saved.crafters)) {
      if (crafters[id] !== undefined) crafters[id] = names;
    }
  }
}

function saveToStorage() {
  try {
    const now = new Date();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ data, crafters, crafterAssignments, savedAt: now.toISOString() }));
    updateTimestamp(now);
    showToast('Saved');
  } catch { showToast('Save failed', true); }
}

function updateTimestamp(date) {
  const el = document.getElementById('saveTimestamp');
  if (!el) return;
  const pad = n => String(n).padStart(2, '0');
  const d = date instanceof Date ? date : new Date(date);
  el.innerHTML = `Saved <span>${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}</span>`;
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    mergeData(saved);
    if (saved.savedAt) updateTimestamp(saved.savedAt);
  } catch { /* silently fail on corrupt storage */ }
}

// ── TOAST ─────────────────────────────────────────────────────────────────
const toast = document.createElement('div');
toast.id = 'toast';
document.body.appendChild(toast);
let toastTimer = null;

function showToast(msg, error = false) {
  toast.textContent = msg;
  toast.className = 'toast' + (error ? ' toast-error' : '') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

loadFromStorage();
if (localStorage.getItem('regear-theme') === 'dark') {
  document.body.classList.add('dark');
  document.getElementById('themeBtn').textContent = 'L';
}
renderAll();
